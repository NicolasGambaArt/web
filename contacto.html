  <style>
    /* ─── PAGE-CONTACTO ────────────────────────────────────── */
    body.page-contacto {
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ─── CENTRADO TOTAL ───────────────────────────────────── */
    .contacto-stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── COLUMNA CENTRAL ──────────────────────────────────── */
    .contacto-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    /* ─── EYEBROW ──────────────────────────────────────────── */
    .c-eyebrow {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.35;
      display: block;
      animation: cUpDim035 0.4s ease both 0.04s;
    }

    /* ─── LÍNEA ACENTO ─────────────────────────────────────── */
    .c-rule {
      width: 32px;
      height: 1px;
      background: var(--accent);
      margin: 28px auto 32px;
      animation: cUp 0.4s ease both 0.1s;
    }

    /* ─── ITEMS DE CONTACTO ────────────────────────────────── */
    .c-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      animation: cUp 0.4s ease both;
    }

    .c-item:nth-child(1) { animation-delay: 0.16s; }
    .c-item:nth-child(2) { animation-delay: 0.24s; }
    .c-item:nth-child(3) { animation-delay: 0.32s; }
    .c-item:nth-child(4) { animation-delay: 0.40s; }

    .c-item:last-child {
      margin-bottom: 0;
    }

    /* Micro-label sobre el item (solo para Ebra) */
    .c-sublabel {
      font-family: var(--font-ui);
      font-size: 8px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.38;
      display: block;
      margin-bottom: 6px;
    }

    /* El link en sí */
    .c-link {
      font-family: var(--font-ui);
      font-size: 1.05rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 140ms ease;
      line-height: 1;
    }

    .c-link:hover {
      opacity: 0.35;
    }

    /* ─── UBICACIÓN FINAL ──────────────────────────────────── */
    .c-location {
      margin-top: 56px;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.28;
      animation: cUpDim028 0.4s ease both 0.48s;
    }

    /* ─── ENTRADA ──────────────────────────────────────────── */
    @keyframes cUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    /* Variantes que respetan la opacidad final del CSS */
    @keyframes cUpDim035 {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 0.35; transform: translateY(0); }
    }
    @keyframes cUpDim028 {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 0.28; transform: translateY(0); }
    }

    /* ─── MOBILE ≤768px ─────────────────────────────────────── */
    @media (max-width: 768px) {

      /* Stage: centra en la pantalla completa (nav flota encima) */
      .contacto-stage {
        min-height: 100svh;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
      }

      /* Emails largos no desbordan */
      .c-link {
        font-size: 0.82rem;
        word-break: break-all;
        letter-spacing: 0.02em;
      }

      /* Columna central: ancho contenido */
      .contacto-col {
        max-width: 100%;
      }
    }
  </style>
</head>
